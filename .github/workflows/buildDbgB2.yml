name: Build2 build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
  

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup Build2
      run:  wget https://download.build2.org/0.18.1/bindist/ubuntu/ubuntu24.04/x86_64/build2-toolchain_0.18.1-0~ubuntu24.04_amd64.deb
    - name: Sha256sum
      run:  wget https://download.build2.org/0.18.1/bindist/ubuntu/ubuntu24.04/x86_64/packages.sha256
    - name: SHA256 compare
      run:  sha256sum -c packages.sha256
    - name: Build2 install
      run:  apt-get install ./build2-toolchain_0.18.1-0~ubuntu24.04_amd64.deb
    - name: Create build configuration
      run:  bdep init -C @clang config.c=clang config.cxx=clang++ config.cxx.std=c++20
    - name: Compile
      run: b
      
